name: Build Node.js for Android

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      node_version:
        description: Node.js 22.x version
        required: true
        default: 22.23.1
        type: string
      android_api:
        description: Android API level
        required: true
        default: "26"
        type: string

permissions:
  contents: write

jobs:
  build-arm64-v8a:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    env:
      NODE_VERSION: ${{ inputs.node_version || '22.23.1' }}
      ANDROID_API: ${{ inputs.android_api || '26' }}
      NDK_VERSION: 28.2.13676358
    steps:
      # Pin actions to the exact revisions exercised by the validated build.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl file make python3 unzip xz-utils

      - name: Set up Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install Android NDK
        run: sdkmanager "ndk;$NDK_VERSION"

      - name: Download and verify Node.js source
        run: |
          test "${NODE_VERSION%%.*}" = "22"
          curl --fail --location --retry 3 --output "node-v$NODE_VERSION.tar.xz" \
            "https://nodejs.org/dist/v$NODE_VERSION/node-v$NODE_VERSION.tar.xz"
          curl --fail --location --retry 3 --output SHASUMS256.txt \
            "https://nodejs.org/dist/v$NODE_VERSION/SHASUMS256.txt"
          grep " node-v$NODE_VERSION.tar.xz$" SHASUMS256.txt | sha256sum --check
          tar -xf "node-v$NODE_VERSION.tar.xz"

      - name: Run tests
        run: |
          ./tests/smoke.sh
          python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Build arm64-v8a library
        run: |
          ./scripts/build-node-android.sh \
            "$PWD/node-v$NODE_VERSION" \
            "$ANDROID_HOME/ndk/$NDK_VERSION" \
            "$PWD/dist" \
            "$ANDROID_API"

      - name: Verify build output
        run: ./scripts/verify-output.sh "$PWD/dist"

      - name: Package output
        run: |
          archive="node-v$NODE_VERSION-android-arm64-v8a.tar.gz"
          tar -C dist -czf "$archive" .
          sha256sum "$archive" > "$archive.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: node-${{ env.NODE_VERSION }}-android-arm64-v8a
          path: |
            node-v${{ env.NODE_VERSION }}-android-arm64-v8a.tar.gz
            node-v${{ env.NODE_VERSION }}-android-arm64-v8a.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Publish continuous GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/publish-continuous-release.sh \
            "node-v$NODE_VERSION-android-arm64-v8a.tar.gz" \
            "node-v$NODE_VERSION-android-arm64-v8a.tar.gz.sha256" \
            continuous
